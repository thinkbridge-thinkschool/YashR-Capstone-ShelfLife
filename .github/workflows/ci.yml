name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore ShelfLife.sln

      - name: Build
        run: dotnet build ShelfLife.sln --no-restore --configuration Release

      - name: Unit Tests
        run: >
          dotnet test ShelfLife.sln
          --no-build --configuration Release
          --filter "Category!=Integration"
          --logger "trx;LogFileName=unit-results.trx"

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/*.trx'
