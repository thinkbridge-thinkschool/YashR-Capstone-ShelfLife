services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "ShelfLife_Dev!2024"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    # Use bash /dev/tcp instead of sqlcmd — works regardless of tools path
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/1433' 2>/dev/null && echo ok || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
    command: azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0

  seq:
    image: datalust/seq:latest
    environment:
      ACCEPT_EULA: "Y"
      # Seq 2025.x requires this on first run — opt out of auth for local dev
      SEQ_FIRSTRUN_NOAUTHENTICATION: "true"
    ports:
      - "5341:5341"
      - "8081:80"

  api:
    build:
      context: .
      dockerfile: src/Host/ShelfLife.Api/Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__ShelfLife: "Server=sqlserver;Database=ShelfLife;User Id=sa;Password=ShelfLife_Dev!2024;TrustServerCertificate=True"
      ServiceBus__FullyQualifiedNamespace: ""
      Seq__ServerUrl: "http://seq:5341"
      Jwt__Secret: "dev-only-secret-key-shelflife-2024-local!"
      Jwt__Issuer: "shelflife-api"
      Jwt__Audience: "shelflife-client"
    depends_on:
      sqlserver:
        condition: service_healthy
      azurite:
        condition: service_started
      seq:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: Workers/ShelfLife.OverdueWorker/Dockerfile
    environment:
      DOTNET_ENVIRONMENT: Development
      ConnectionStrings__ShelfLife: "Server=sqlserver;Database=ShelfLife;User Id=sa;Password=ShelfLife_Dev!2024;TrustServerCertificate=True"
      ServiceBus__FullyQualifiedNamespace: ""
      Seq__ServerUrl: "http://seq:5341"
    depends_on:
      sqlserver:
        condition: service_healthy
      azurite:
        condition: service_started

volumes:
  sqlserver-data:
