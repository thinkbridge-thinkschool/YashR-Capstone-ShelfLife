name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-unit-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore ShelfLife.slnx

      - name: Build
        run: dotnet build ShelfLife.slnx --no-restore --configuration Release

      - name: Vulnerability Scan
        run: |
          dotnet list ShelfLife.slnx package --vulnerable --include-transitive 2>&1 | tee vuln-report.txt
          if grep -qiE "(Critical|High)" vuln-report.txt; then
            echo "::error::Critical or High severity vulnerabilities found — see vuln-report.txt"
            exit 1
          fi

      - name: Format Check
        run: dotnet format ShelfLife.slnx --verify-no-changes

      - name: Unit Tests
        run: >
          dotnet test ShelfLife.slnx
          --no-build --configuration Release
          --filter "Category!=Integration"
          --logger "trx;LogFileName=unit-results.trx"

      - name: Upload Unit Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: '**/*.trx'

  integration-tests:
    runs-on: ubuntu-latest
    needs: build-and-unit-test

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore ShelfLife.slnx

      - name: Build
        run: dotnet build ShelfLife.slnx --no-restore --configuration Release

      - name: Integration Tests
        run: >
          dotnet test ShelfLife.slnx
          --no-build --configuration Release
          --filter "Category=Integration"
          --logger "trx;LogFileName=integration-results.trx"

      - name: Upload Integration Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: '**/*.trx'
